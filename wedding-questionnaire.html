<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Story Starts Here | Haus of Lyra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#141414;
  --dark2:#1d1d1d;
  --dark3:#282828;
  --gold:#cead6f;
  --gold-faint:rgba(206,173,111,0.08);
  --gold-mid:rgba(206,173,111,0.2);
  --cream:#F5F6F3;
  --muted:rgba(245,246,243,0.45);
  --border:rgba(245,246,243,0.1);
  --border-gold:rgba(206,173,111,0.3);
}
html{scroll-behavior:smooth}
body{
  background:var(--dark);
  color:var(--cream);
  font-family:'Josefin Sans',sans-serif;
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── STARS BG ── */
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:var(--gold);animation:twinkle var(--d,3s) ease-in-out infinite var(--del,0s)}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.4)}}

/* Film Grain Texture */
.noise-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.012;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;min-height:100vh}

/* ── PROGRESS ── */
#progress-bar{
  position:fixed;top:0;left:0;height:2px;
  background:var(--gold);
  transition:width .4s ease;
  z-index:100;
}
#progress-label{
  position:fixed;top:12px;right:20px;
  font-size:10px;letter-spacing:3px;color:var(--muted);
  z-index:100;text-transform:uppercase;
}
#save-indicator{
  position:fixed;top:12px;left:20px;
  font-size:10px;letter-spacing:2px;color:var(--gold);
  z-index:100;opacity:0;transition:opacity .4s;
}

/* ── SCREENS ── */
.screen{
  display:none;min-height:100vh;
  flex-direction:column;align-items:center;justify-content:center;
  padding:4rem 2rem;text-align:center;
}
.screen.active{display:flex;animation:fadeUp .5s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── CHAPTER HEADER ── */
.chapter-badge{
  display:inline-block;
  border:0.5px solid var(--border-gold);
  color:var(--gold);font-size:9px;letter-spacing:4px;text-transform:uppercase;
  padding:6px 18px;border-radius:2px;margin-bottom:2rem;
}
.q-num{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:.75rem;text-transform:uppercase}
.q-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.6rem,4vw,2.4rem);font-weight:300;line-height:1.25;
  color:var(--cream);margin-bottom:.5rem;max-width:580px;
}
.q-sub{font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:2.5rem;text-transform:uppercase}

/* ── INPUTS ── */
.text-input{
  background:transparent;border:none;
  border-bottom:0.5px solid rgba(245,246,243,0.25);
  color:var(--cream);
  font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;font-style:italic;
  width:100%;max-width:520px;padding:.75rem 0;
  outline:none;text-align:center;margin-bottom:2rem;
  transition:border-color .2s;
}
.text-input:focus{border-bottom-color:var(--gold)}
.text-input::placeholder{color:rgba(245,246,243,0.2)}
textarea.text-input{resize:vertical;min-height:80px;text-align:left;padding:.75rem;border:0.5px solid rgba(245,246,243,0.2);border-radius:4px}
textarea.text-input:focus{border-color:var(--gold)}

/* ── OPTION BUTTONS ── */
.options-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:10px;width:100%;max-width:540px;margin-bottom:2rem;
}
.options-grid.col3{grid-template-columns:repeat(3,1fr)}
.options-grid.col1{grid-template-columns:1fr}
.opt-btn{
  background:transparent;
  border:0.5px solid var(--border);
  color:var(--cream);
  font-family:'Josefin Sans',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  padding:1rem 1.25rem;border-radius:3px;cursor:pointer;
  transition:all .2s ease;text-align:center;
}
.opt-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-faint)}
.opt-btn.selected{border-color:var(--gold);color:var(--gold);background:var(--gold-faint)}

/* ── NAV ── */
.nav-row{display:flex;align-items:center;gap:1.5rem;margin-top:1rem}
.btn-next{
  background:var(--gold);color:var(--dark);
  font-family:'Josefin Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  padding:.85rem 2.5rem;border:none;border-radius:2px;cursor:pointer;
  transition:opacity .2s;font-weight:400;
}
.btn-next:hover{opacity:.85}
.btn-back{
  background:transparent;border:none;color:var(--muted);
  font-family:'Josefin Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:color .2s;
}
.btn-back:hover{color:var(--cream)}

/* ── INTRO ── */
.intro-logo{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:3rem}
.intro-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,4.5rem);font-weight:300;line-height:1.05;margin-bottom:1rem}
.intro-title em{font-style:italic;color:var(--gold)}
.divider{width:40px;height:1px;background:var(--gold);margin:2rem auto}
.intro-body{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;color:var(--muted);max-width:480px;line-height:1.8;margin-bottom:.5rem}
.snack-box{
  border:0.5px solid var(--border-gold);border-radius:4px;
  padding:1.25rem 1.75rem;max-width:440px;margin:1.5rem auto 2.5rem;
  font-size:11px;letter-spacing:1.5px;color:var(--gold);line-height:1.9;text-transform:uppercase;
  background:var(--gold-faint);
}
.snack-box strong{display:block;font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:.5rem}

/* ── CHAPTER DIVIDER SCREENS ── */
.chapter-screen{background:var(--dark2)}
.chapter-num{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,15vw,10rem);font-weight:300;color:rgba(206,173,111,0.05);line-height:1;position:absolute}
.chapter-content{position:relative;z-index:1}
.chapter-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:300;margin-bottom:.5rem}
.chapter-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:2rem}

/* ── PRIVATE SCREEN ── */
.private-screen{background:#0f0f0f}
.private-icon{font-size:3rem;margin-bottom:1.5rem;filter:grayscale(1);opacity:.6}
.private-title{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;margin-bottom:1rem}
.private-sub{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;max-width:420px;line-height:2;margin-bottom:2.5rem}

/* ── MINI GAME: WORD BUBBLES ── */
.word-builder{width:100%;max-width:520px;margin-bottom:2rem}
.word-bubble-area{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  min-height:60px;padding:1rem;
  border:0.5px solid var(--border);border-radius:4px;margin-bottom:1rem;
  background:var(--dark2);
}
.word-bubble{
  border:0.5px solid var(--border-gold);color:var(--gold);
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  padding:6px 14px;border-radius:20px;cursor:pointer;
  transition:all .15s;background:var(--gold-faint);
  animation:popIn .2s ease;
}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.word-bubble:hover{background:var(--gold);color:var(--dark)}
.word-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:.5rem}
.word-chip{
  border:0.5px solid var(--border);color:var(--muted);
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .15s;
}
.word-chip:hover{border-color:var(--gold);color:var(--gold)}
.word-chip.used{opacity:.25;pointer-events:none}
.word-custom-row{display:flex;gap:8px;align-items:center;margin-top:.75rem;justify-content:center}
.word-custom-input{
  background:transparent;border-bottom:0.5px solid var(--border);
  color:var(--cream);font-family:'Josefin Sans',sans-serif;font-size:11px;letter-spacing:1px;
  padding:4px 8px;outline:none;width:150px;text-align:center;
}
.word-custom-input:focus{border-bottom-color:var(--gold)}
.word-add-btn{
  background:transparent;border:0.5px solid var(--border-gold);color:var(--gold);
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;border-radius:2px;cursor:pointer;transition:all .15s;
}
.word-add-btn:hover{background:var(--gold);color:var(--dark)}
.word-count{font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:.5rem}

/* ── MINI GAME: FLIP CARD ── */
.flip-arena{display:flex;gap:1.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.flip-card-wrap{perspective:800px;cursor:pointer}
.flip-card{
  width:160px;height:200px;position:relative;
  transform-style:preserve-3d;transition:transform .5s ease;border-radius:6px;
}
.flip-card-wrap.flipped .flip-card{transform:rotateY(180deg)}
.flip-face{
  position:absolute;inset:0;border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  backface-visibility:hidden;padding:1.5rem;
}
.flip-front{
  background:var(--dark3);border:0.5px solid var(--border);
}
.flip-back{
  background:var(--gold-faint);border:0.5px solid var(--border-gold);
  transform:rotateY(180deg);
}
.flip-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.6}
.flip-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.flip-back .flip-label{color:var(--gold)}
.flip-hint{font-size:9px;letter-spacing:1px;color:var(--muted);margin-top:.5rem}
.flip-result-area{max-width:480px;width:100%;margin-bottom:1.5rem}
.flip-story-input{width:100%}

/* ── MINI GAME: MOOD MAP ── */
.mood-map-wrap{position:relative;width:280px;height:280px;margin:0 auto 2rem;cursor:crosshair}
.mood-grid{
  width:100%;height:100%;border:0.5px solid var(--border);border-radius:4px;
  position:relative;background:var(--dark2);
}
.mood-axis-label{
  position:absolute;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
}
.mood-axis-label.top{top:-20px;left:50%;transform:translateX(-50%)}
.mood-axis-label.bottom{bottom:-20px;left:50%;transform:translateX(-50%)}
.mood-axis-label.left{left:-50px;top:50%;transform:translateY(-50%) rotate(-90deg);width:80px;text-align:center}
.mood-axis-label.right{right:-50px;top:50%;transform:translateY(-50%) rotate(90deg);width:80px;text-align:center}
.mood-line-h,.mood-line-v{position:absolute;background:var(--border)}
.mood-line-h{top:50%;left:0;right:0;height:0.5px}
.mood-line-v{left:50%;top:0;bottom:0;width:0.5px}
.mood-dot{
  position:absolute;width:14px;height:14px;border-radius:50%;
  background:var(--gold);transform:translate(-50%,-50%);
  box-shadow:0 0 0 4px var(--gold-mid);
  transition:left .1s,top .1s;pointer-events:none;
  display:none;
}
.mood-tag{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);
  margin-top:2.5rem;min-height:20px;text-align:center;
}

/* ── MINI GAME: FILM GENRE ── */
.genre-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;width:100%;max-width:540px;margin-bottom:2rem;
}
.genre-card{
  background:var(--dark2);border:0.5px solid var(--border);
  border-radius:4px;padding:1.25rem .75rem;cursor:pointer;
  transition:all .2s;text-align:center;
}
.genre-card:hover{border-color:var(--gold);background:var(--gold-faint)}
.genre-card.selected{border-color:var(--gold);background:var(--gold-faint)}
.genre-icon{font-size:1.5rem;margin-bottom:.5rem;display:block}
.genre-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cream);display:block;margin-bottom:.25rem}
.genre-desc{font-size:9px;letter-spacing:1px;color:var(--muted);display:block;text-transform:uppercase}

/* ── MINI GAME: MOVIE TITLE ── */
.title-generator{width:100%;max-width:520px;margin-bottom:2rem}
.title-marquee-wrap{
  overflow:hidden;border:0.5px solid var(--border-gold);border-radius:4px;
  padding:.75rem 1rem;margin-bottom:1rem;background:var(--dark2);
}
.title-marquee-inner{
  font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;
  color:var(--gold);white-space:nowrap;
  animation:marqueeScroll 8s linear infinite;
}
@keyframes marqueeScroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.title-marquee-inner.paused{animation:none;transform:none}

/* ── MINI GAME: TIMELINE ── */
.timeline-wrap{width:100%;max-width:520px;margin-bottom:2rem}
.timeline-pins{position:relative;display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.timeline-pin{
  display:flex;align-items:center;gap:10px;
  font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
}
.pin-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
.add-pin-row{display:flex;gap:8px;margin-top:1rem;justify-content:center}
.pin-input{
  background:transparent;border-bottom:0.5px solid var(--border);
  color:var(--cream);font-family:'Josefin Sans',sans-serif;font-size:11px;
  padding:4px 8px;outline:none;width:200px;text-align:center;
}
.pin-input:focus{border-bottom-color:var(--gold)}

/* ── MUSIC SECTION ── */
.music-tags-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.5rem;max-width:520px}
.music-tag{
  border:0.5px solid var(--border);color:var(--muted);
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .15s;
}
.music-tag:hover{border-color:var(--gold);color:var(--gold)}
.music-tag.selected{border-color:var(--gold);color:var(--gold);background:var(--gold-faint)}

/* ── FINAL SCREEN ── */
.final-stars{display:flex;gap:6px;justify-content:center;margin-bottom:1.5rem}
.f-star{color:var(--gold);font-size:14px;animation:starPop .4s ease forwards;opacity:0}
.f-star:nth-child(1){animation-delay:.1s}
.f-star:nth-child(2){animation-delay:.2s}
.f-star:nth-child(3){animation-delay:.3s}
.f-star:nth-child(4){animation-delay:.4s}
.f-star:nth-child(5){animation-delay:.5s}
@keyframes starPop{to{opacity:1;transform:scale(1.2)}}
.final-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:300;margin-bottom:1rem}
.final-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem}
.final-body{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;color:var(--muted);max-width:420px;line-height:1.8;margin-bottom:2rem}
.summary-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin-bottom:2rem}
.summary-chip{
  border:0.5px solid var(--border-gold);color:var(--gold);
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 12px;border-radius:2px;
}
.submitting-msg{font-size:11px;letter-spacing:2px;color:var(--muted);margin-top:.75rem}
.error-msg{font-size:11px;letter-spacing:1.5px;color:#e05c5c;margin-top:.75rem}
</style>
</head>
<body>

<div id="starfield"></div>
<div class="noise-overlay"></div>
<div id="progress-bar"></div>
<div id="progress-label"></div>
<div id="save-indicator">Progress saved</div>

<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const FORMSPREE = 'https://formspree.io/f/xrejbjoz';
const SAVE_KEY = 'hol_wedding_q';

const answers = {};
let currentIdx = 0;

// Screens definition
// Types: intro | chapter | private | text | textarea | options | words | flip | moodmap | genre | movietitle | timeline | music | final
const SCREENS = [
  // ── INTRO
  {id:'intro', type:'intro'},

  // ── CHAPTER 1: THE BASICS
  {id:'ch1', type:'chapter', num:'01', title:'The Basics', sub:'Let\'s get the formalities out of the way.'},
  {id:'names', type:'text', chapter:'The Basics', q:'What are your full names?', sub:'As you want them to appear in your film', placeholder:'e.g. Jordan & Taylor Reeves', key:'names'},
  {id:'date', type:'text', chapter:'The Basics', q:'Wedding date and location(s)?', sub:'Include ceremony + reception if different', placeholder:'e.g. June 14, 2025 — Blank Canvas DSM', key:'date'},
  {id:'three_words', type:'words', chapter:'The Basics', q:'Describe your relationship in three words.', sub:'Pick from the list or add your own', key:'three_words'},

  // ── CHAPTER 2: YOUR ORIGIN STORY
  {id:'ch2', type:'chapter', num:'02', title:'Your Origin Story', sub:'How it all started.'},
  {id:'met', type:'textarea', chapter:'Origin Story', q:'How did you two meet?', sub:'All the details. We love details.', placeholder:'It was a Tuesday and neither of us was supposed to be there...', key:'met'},
  {id:'first_move', type:'flip', chapter:'Origin Story', q:'Who made the first move?', sub:'Tap the card to reveal', key:'first_move'},
  {id:'first_impression', type:'textarea', chapter:'Origin Story', q:'What was your first impression of each other?', sub:'Honest answers only', placeholder:'I thought they were... and they thought I was...', key:'first_impression'},
  {id:'realized', type:'textarea', chapter:'Origin Story', q:'When did you realize "this is my person"?', sub:'The moment it clicked', placeholder:'It happened when...', key:'realized'},

  // ── PRIVATE: PARTNER 1
  {id:'priv1', type:'private', label:'Partner 1', msg:'Time for your private answers. Ask your partner to step away for a moment.'},
  {id:'p1_unseen_beauty', type:'textarea', chapter:'Private — Partner 1', q:'What is something beautiful about your partner that nobody else gets to see?', sub:'The quiet qualities', placeholder:'I love the way they...', key:'p1_unseen_beauty'},
  {id:'p1_anchor', type:'textarea', chapter:'Private — Partner 1', q:'In a room full of people, how does your partner make you feel anchored?', sub:'What brings you back to earth?', placeholder:'Just a quick glance or when they...', key:'p1_anchor'},
  {id:'p1_unspoken_word', type:'text', chapter:'Private — Partner 1', q:'What is a gesture you two share that has a secret, unspoken meaning?', sub:'Your private code', placeholder:'A triple squeeze of the hand, a specific nod...', key:'p1_unspoken_word'},
  {id:'p1_fav_memory', type:'textarea', chapter:'Private — Partner 1', q:'What\'s your favorite memory together so far?', sub:'Just between you and us', placeholder:'The one you keep coming back to...', key:'p1_fav_memory'},
  {id:'p1_love_most', type:'textarea', chapter:'Private — Partner 1', q:'What do you love most about your partner?', sub:'Go as deep as you want', placeholder:'More than anything, it\'s...', key:'p1_love_most'},
  {id:'p1_laugh', type:'text', chapter:'Private — Partner 1', q:'What does your partner do that always makes you laugh?', sub:'The specific thing', placeholder:'Every time they...', key:'p1_laugh'},
  {id:'p1_small_thing', type:'text', chapter:'Private — Partner 1', q:'What\'s something small your partner does that means a lot to you?', sub:'The quiet stuff', placeholder:'When they...', key:'p1_small_thing'},
  {id:'p1_say', type:'textarea', chapter:'Private — Partner 1', q:'What\'s one thing you want to say to your partner on your wedding day?', sub:'This might make it into the film', placeholder:'I want you to know...', key:'p1_say'},

  // ── PRIVATE: PARTNER 2
  {id:'priv2', type:'private', label:'Partner 2', msg:'Now switch. Partner 1, step away — it\'s their turn.'},
  {id:'p2_unseen_beauty', type:'textarea', chapter:'Private — Partner 2', q:'What is something beautiful about your partner that nobody else gets to see?', sub:'The quiet qualities', placeholder:'I love the way they...', key:'p2_unseen_beauty'},
  {id:'p2_anchor', type:'textarea', chapter:'Private — Partner 2', q:'In a room full of people, how does your partner make you feel anchored?', sub:'What brings you back to earth?', placeholder:'Just a quick glance or when they...', key:'p2_anchor'},

const TOTAL_Q = SCREENS.filter(s => !['intro','chapter','private','final'].includes(s.type)).length;

// ── UTILS ────────────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem(SAVE_KEY, JSON.stringify({answers, currentIdx}));
  const ind = document.getElementById('save-indicator');
  ind.style.opacity = '1';
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(()=>ind.style.opacity='0', 1800);
}

function load(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const d = JSON.parse(raw);
    Object.assign(answers, d.answers||{});
    currentIdx = d.currentIdx||0;
  }catch(e){}
}

function countAnswered(){
  return SCREENS.filter(s=>!['intro','chapter','private','final'].includes(s.type) && answers[s.key] && String(answers[s.key]).trim()).length;
}

function updateProgress(){
  const qScreens = SCREENS.filter(s=>!['intro','chapter','private','final'].includes(s.type));
  const total = qScreens.length;
  const done = qScreens.filter(s=>answers[s.key] && String(answers[s.key]).trim()).length;
  const pct = Math.round((currentIdx / (SCREENS.length-1)) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total}`;
}

// ── STARS ────────────────────────────────────────────────────────────────────
function buildStars(){
  const el = document.getElementById('starfield');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2+1;
    s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--del:${-Math.random()*5}s;--op:${0.2+Math.random()*0.5}`;
    el.appendChild(s);
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  updateProgress();
  const s = SCREENS[currentIdx];
  const app = document.getElementById('app');
  app.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'screen active' + (s.type==='chapter'?' chapter-screen':s.type==='private'?' private-screen':'');
  div.innerHTML = buildScreen(s);
  app.appendChild(div);
  bindScreen(s, div);
  window.scrollTo(0,0);
}

function buildScreen(s){
  switch(s.type){
    case 'intro': return buildIntro();
    case 'chapter': return buildChapter(s);
    case 'private': return buildPrivate(s);
    case 'text': return buildText(s);
    case 'textarea': return buildTextarea(s);
    case 'options': return buildOptions(s);
    case 'words': return buildWords(s);
    case 'flip': return buildFlip(s);
    case 'moodmap': return buildMoodMap(s);
    case 'genre': return buildGenre(s);
    case 'movietitle': return buildMovieTitle(s);
    case 'timeline': return buildTimeline(s);
    case 'music': return buildMusic(s);
    case 'final': return buildFinal();
  }
}

    <div class="q-sub">Add your biggest milestones — the moments that shaped your story</div>
    <div class="timeline-wrap">
      <div class="timeline-pins" id="pin-list">${pinsHTML}</div>
      <div class="add-pin-row">
        <input class="pin-input" id="pin-input" placeholder="e.g. First date / Got the dog / Moved in together" maxlength="60">
        <button class="word-add-btn" onclick="addPin('${s.key}')">+ Add</button>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-back" onclick="prev()">Back</button>
      <button class="btn-next" onclick="next()">Continue</button>
    </div>
  `;
}

// MUSIC GENRES
function buildMusic(s){
  const val = answers[s.key]||'';
  const selected = val ? val.split(',').map(v=>v.trim()) : [];
  const genres = ['Pop','Indie','R&B / Soul','Country','Folk / Acoustic','Hip-Hop','Classical','Jazz','Rock','Alternative','Electronic','Gospel / Worship','Singer-Songwriter','Cinematic / Orchestral'];
  const tags = genres.map(g=>`<div class="music-tag${selected.includes(g)?' selected':''}" onclick="toggleMusicTag(this,'${g}','${s.key}')">${g}</div>`).join('');
  return `
    <div class="chapter-badge">${s.chapter||''}</div>
    <div class="q-text">${s.q}</div>
    <div class="q-sub">Pick all that apply</div>
    <div class="music-tags-wrap">${tags}</div>
    <div class="nav-row">
      <button class="btn-back" onclick="prev()">Back</button>
      <button class="btn-next" onclick="next()">Continue</button>
    </div>
  `;
}

// FINAL
function buildFinal(){
  const couple = answers['names']||'you two';
  const chips = Object.entries(answers).filter(([k,v])=>v&&String(v).trim()&&!k.startsWith('p1_')&&!k.startsWith('p2_')).slice(0,8);
  const chipsHTML = chips.map(([k,v])=>{
    const short = String(v).length > 30 ? String(v).substring(0,30)+'...' : v;
    return `<div class="summary-chip">${short}</div>`;
  }).join('');
  return `
    <div class="final-stars">
      <span class="f-star">+</span><span class="f-star">+</span><span class="f-star">+</span><span class="f-star">+</span><span class="f-star">+</span>
    </div>
    <div class="final-title">That's a wrap,<br><em>${couple}.</em></div>
    <div class="divider"></div>
    <p class="final-body">Your answers are everything we need to start building your film. Dakota will be in touch within 48 hours to keep the conversation going.</p>
    <div class="summary-row">${chipsHTML}</div>
    <p style="font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem">One last step — submit your responses</p>
    <button class="btn-next" id="submit-btn" onclick="submitForm()">Send to Haus of Lyra</button>
    <div class="submitting-msg" id="submit-msg"></div>
    <div class="error-msg" id="error-msg"></div>
  `;
}

// ── BINDINGS & HELPERS ────────────────────────────────────────────────────────
function bindScreen(s, div){
  if(s.type==='moodmap'){
    const val = answers[s.key];
    if(val && window.lastMoodCoords){
      setTimeout(()=>{
        const dot = document.getElementById('mood-dot');
        if(dot){
          dot.style.left = (window.lastMoodCoords.x * 100) + '%';
          dot.style.top = (window.lastMoodCoords.y * 100) + '%';
          dot.style.display = 'block';
        }
      }, 50);
    }
  }
}

// Word bubbles
function addWord(chip, word){
  const area = document.getElementById('bubble-area');
  const current = area.querySelectorAll('.word-bubble').length;
  if(current >= 3) return;
  chip.classList.add('used');
  const b = document.createElement('div');
  b.className='word-bubble';
  b.textContent = word + ' ×';
  b.onclick = ()=>removeWord(b, word);
  area.appendChild(b);
  updateWordAnswer();
}
function removeWord(bubble, word){
  bubble.remove();
  const chips = document.querySelectorAll('.word-chip');
  chips.forEach(c=>{ if(c.textContent===word) c.classList.remove('used'); });
  updateWordAnswer();
}
function addCustomWord(){
  const inp = document.getElementById('custom-word');
  const w = inp.value.trim();
  if(!w) return;
  const area = document.getElementById('bubble-area');
  if(area.querySelectorAll('.word-bubble').length >= 3) return;
  const b = document.createElement('div');
  b.className='word-bubble';
  b.textContent = w + ' ×';
  b.onclick = ()=>removeWord(b, w);
  area.appendChild(b);
  inp.value='';
  updateWordAnswer();
}
function updateWordAnswer(){
  const area = document.getElementById('bubble-area');
  const words = [...area.querySelectorAll('.word-bubble')].map(b=>b.textContent.replace(' ×','').trim());
  const countEl = document.getElementById('word-count');
  if(countEl) countEl.textContent = words.length + ' / 3 selected';
  answers['three_words'] = words.join(', ');
  save();
}

// Options
function selectOpt(btn, key, val){
  btn.closest('.options-grid').querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[key] = val;
  save();
}

// Text
function saveText(key){
  const el = document.getElementById('qi');
  if(el){ answers[key] = el.value; save(); }
}

// Flip card
function flipCard(num){
  document.getElementById('flip'+num).classList.toggle('flipped');
  saveFlip();
}
function saveFlip(){
  const s1 = document.getElementById('flip1-sel');
  const s2 = document.getElementById('flip2-sel');
  const story = document.getElementById('flip-story');
  const f1 = document.getElementById('flip1');
  const f2 = document.getElementById('flip2');
  const data = {
    p1: s1?s1.value:'',
    p2: s2?s2.value:'',
    story: story?story.value:'',
    p1flipped: f1?f1.classList.contains('flipped'):false,
    p2flipped: f2?f2.classList.contains('flipped'):false,
  };
  if(s1&&s1.value){
    const back1 = document.querySelector('#flip1 .flip-back .flip-label');
    if(back1) back1.textContent = s1.value;
  }
  if(s2&&s2.value){
    const back2 = document.querySelector('#flip2 .flip-back .flip-label');
    if(back2) back2.textContent = s2.value;
  }
  answers['first_move'] = JSON.stringify(data);
  save();
}
function saveFlipFull(){
  saveFlip();
}

// Mood map
function dropMoodPin(e){
  const grid = document.getElementById('mood-grid');
  const dot = document.getElementById('mood-dot');
  const rect = grid.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  dot.style.left = (x*100)+'%';
  dot.style.top = (y*100)+'%';
  dot.style.display='block';
  window.lastMoodCoords = { x, y };

  const xLabel = x < 0.33 ? 'emotional' : x < 0.66 ? 'balanced' : 'upbeat';
  const yLabel = y < 0.33 ? 'cinematic' : y < 0.66 ? 'mid-tempo' : 'intimate';

  const tags = {
    'emotional-cinematic':'Grand + sweeping. Emotional score with soaring strings.',
    'emotional-mid-tempo':'Heartfelt indie. Acoustic vocals, building moments.',
    'emotional-intimate':'Quiet + vulnerable. Piano-forward, minimal production.',
    'balanced-cinematic':'Cinematic pop. Recognizable but elevated.',
    'balanced-mid-tempo':'Modern indie wedding. Warm, textured, real.',
    'balanced-intimate':'Soft singer-songwriter. Gentle and present.',
    'upbeat-cinematic':'Epic + celebratory. Full-sound, big moments.',
    'upbeat-mid-tempo':'Feel-good and danceable. Energy without chaos.',
    'upbeat-intimate':'Light + joyful. Breezy acoustic with a smile.',
  };

  const tag = tags[`${xLabel}-${yLabel}`]||'Your vibe is uniquely yours.';
  const tagEl = document.getElementById('mood-tag');
  if(tagEl) tagEl.textContent = tag;
  answers['music_vibe'] = `${xLabel} / ${yLabel} — ${tag}`;
  save();
}

// Genre
function selectGenre(card, genre, key){
  document.querySelectorAll('.genre-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  answers[key] = genre;
  save();
}

// Movie title
function updateMarquee(val, key){
  const m = document.getElementById('marquee-inner');
  if(!m) return;
  m.textContent = val||'Your Title Here';
  if(val){ m.classList.add('paused'); } else { m.classList.remove('paused'); }
  answers[key] = val;
  save();
}

// Timeline pins
function addPin(key){
  const inp = document.getElementById('pin-input');
  const val = inp.value.trim();
  if(!val) return;
  const list = document.getElementById('pin-list');
  const pin = document.createElement('div');
  pin.className='timeline-pin';
  pin.innerHTML=`<div class="pin-dot"></div>${val}`;
  list.appendChild(pin);
  inp.value='';
  const pins = [...list.querySelectorAll('.timeline-pin')].map(p=>p.textContent.trim());
  answers[key] = JSON.stringify({pins});
  save();
}

// Music tags
function toggleMusicTag(el, genre, key){
  el.classList.toggle('selected');
  const selected = [...document.querySelectorAll('.music-tag.selected')].map(t=>t.textContent);
  answers[key] = selected.join(', ');
  save();
}

// ── NAV ──────────────────────────────────────────────────────────────────────
function next(){
  const qi = document.getElementById('qi');
  if(qi && SCREENS[currentIdx].key){
    answers[SCREENS[currentIdx].key] = qi.value;
    save();
  }
  if(currentIdx < SCREENS.length-1){
    currentIdx++;
    save();
    render();
  }
}
function prev(){
  if(currentIdx > 0){
    currentIdx--;
    save();
    render();
  }
}

// ── SUBMIT ───────────────────────────────────────────────────────────────────
async function submitForm(){
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('submit-msg');
  const err = document.getElementById('error-msg');
  btn.disabled=true;
  btn.textContent='Sending...';
  msg.textContent='Submitting your answers — hang tight.';

  // Build a readable body
  const lines = SCREENS
    .filter(s=>s.key)
    .map(s=>{
      const v = answers[s.key];
      if(!v) return null;
      let display = v;
      if(s.key==='first_move'){try{const d=JSON.parse(v);display=`Partner 1: ${d.p1||'?'} | Partner 2: ${d.p2||'?'} | Story: ${d.story||''}` }catch(e){}}
      if(s.key==='timeline'){try{const d=JSON.parse(v);display=d.pins.join(' / ')}catch(e){}}
      return `${s.q}\n${display}`;
    })
    .filter(Boolean)
    .join('\n\n---\n\n');

  const coupleName = answers['names']||'Unknown Couple';
  const weddingDate = answers['date']||'Date TBD';

  const data = new FormData();
  data.append('_subject', `Wedding Film Questionnaire — ${coupleName}`);
  data.append('_replyto', 'noreply@thehausoflyra.com');
  data.append('Couple Names', coupleName);
  data.append('Wedding Date & Location', weddingDate);
  data.append('Full Questionnaire', lines);

  try{
    const res = await fetch(FORMSPREE, {method:'POST', body:data, headers:{Accept:'application/json'}});
    if(res.ok){
      btn.style.display='none';
      msg.style.color='var(--gold)';
      msg.textContent='Submitted. We\'ll be in touch within 48 hours.';
      localStorage.removeItem(SAVE_KEY);
    } else {
      throw new Error('Server error');
    }
  } catch(e){
    btn.disabled=false;
    btn.textContent='Try Again';
    msg.textContent='';
    err.textContent='Something went wrong. Try again or email us directly at hello@thehausoflyra.com';
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildStars();
load();
render();
</script>
